# Static server for socialbankers.org (behind kamal-proxy, which terminates TLS).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Liveness endpoint for the Kamal proxy healthcheck.
    location = /up {
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Security headers (kamal-proxy adds HSTS on the TLS edge).
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;

    # Long-cache fingerprint-free assets modestly (static site, infrequent changes).
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Serve the file, a directory index, or a 404 — no SPA fallback (multi-page site).
    location / {
        try_files $uri $uri/ =404;
    }
}
